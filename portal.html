<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Private Portal | GenzLancer</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,500,700,400&f[]=satoshi@400,500,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/css/base.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./tailwind.config.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.32/dist/lenis.min.js"></script>
  </head>
  <body
    class="bg-slate text-white font-satoshi antialiased overflow-hidden selection:bg-champagne selection:text-white"
  >
    <div class="cursor-dot hidden md:block"></div>
    <div class="cursor-outline hidden md:block"></div>

    <header
      class="absolute w-full top-0 z-50 py-8 px-8 md:px-16 flex justify-between items-center"
    >
      <a
        href="index.html"
        class="font-cabinet font-bold tracking-widest text-xl uppercase text-white hover:text-champagne transition-colors"
        >&larr; Return</a
      >
      <div
        class="font-cabinet font-bold tracking-widest text-sm uppercase text-white/50"
      >
        Encrypted Connection
      </div>
    </header>

    <main
      class="w-full h-screen flex flex-col justify-center items-center px-8 relative"
    >
      <div
        class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cGF0aCBkPSJNNTQgNjBoNlYwaC02djYwem0tMTAgMGg2VjBoLTZ2NjB6bS0xMCAwaDZWMGgtNnY2MHptLTEwIDBoNlYwaC02djYwem0tMTAgMGg2VjBoLTZ2NjB6bS0xMCAwaDZWMGgtNnY2MHoiIGZpbGw9IiNmZmZmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMiIvPjwvc3ZnPg==')] opacity-30 z-0"
      ></div>

      <div class="relative z-10 w-full max-w-md text-center">
        <h1 class="font-cabinet text-4xl md:text-5xl font-bold text-white mb-4">
          Client Portal.
        </h1>
        <p class="text-white/50 mb-12">
          Enter your secure advisory token to access the off-market portfolio.
        </p>

        <form class="w-full">
          <input
            type="password"
            placeholder="ENTER ACCESS KEY"
            class="w-full bg-transparent border-b-2 border-white/20 py-4 text-center text-white text-2xl font-cabinet tracking-[0.3em] uppercase focus:outline-none focus:border-champagne transition-colors placeholder:text-white/20 placeholder:tracking-widest mb-10"
          />

          <button
            type="button"
            class="magnetic-btn w-full border border-champagne text-champagne hover:bg-champagne hover:text-slate py-4 rounded-full font-bold uppercase tracking-widest text-sm transition-all duration-300"
          >
            Authenticate
          </button>
        </form>

        <p class="mt-8 text-sm text-white/30">
          Don't have an access key?
          <a href="contact.html" class="text-champagne hover:underline"
            >Request Advisory</a
          >
        </p>
      </div>
    </main>

    <script src="./src/js/app.js"></script>
  </body>
</html>
